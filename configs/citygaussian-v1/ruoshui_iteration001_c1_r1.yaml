# Ruoshui single-block bootstrap config for CityGaussian V1-original.
# This is not the final large-scene partition plan; it is a minimal entry config
# that keeps block count at one so the project can validate the V1 chain first.

model_params: {
    model_config: {
        name: "GaussianModel",
        kwargs: {}
    },
    sh_degree: 3,
    source_path: "data/ruoshui/iteration001/train",
    partition_name: "ruoshui_iteration001_c1_r1",
    pretrain_path: "output/ruoshui_iteration001_coarse/point_cloud/iteration_30000",
    model_path: "output/ruoshui_iteration001_c1_r1",
    images: "images",
    block_dim: [1, 1, 1],
    aabb: [-9.1, -10.5, -3.7, 8.9, 11.1, 7.2],
    ssim_threshold: 0.1,
    resolution: 4,
    white_background: False,
    data_device: "cuda",
    eval: False,
}

pipeline_params: {
    convert_SHs_python: False,
    compute_cov3D_python: False,
    debug: False
}

optim_params: {
    iterations: 30_000,
    position_lr_init: 0.000064,
    position_lr_final: 0.00000064,
    position_lr_delay_mult: 0.01,
    position_lr_max_steps: 30_000,
    feature_lr: 0.0025,
    opacity_lr: 0.05,
    scaling_lr: 0.004,
    rotation_lr: 0.001,
    percent_dense: 0.01,
    lambda_dssim: 0.2,
    densification_interval: 100,
    opacity_reset_interval: 3000,
    densify_from_iter: 500,
    densify_until_iter: 15_000,
    densify_grad_threshold: 0.0002
}
